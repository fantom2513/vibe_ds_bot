services:

  postgres:
    image: postgres:16-alpine
    container_name: discord-bot-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot-api:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: discord-bot-api
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./sounds:/app/data/sounds
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && exec python -m src.main"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: discord-bot-frontend
    ports:
      - "80:80"
    depends_on:
      - bot-api
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
