name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          API_HOST=0.0.0.0
          API_PORT=8000
          API_SECRET_KEY=${{ secrets.API_SECRET_KEY }}
          SCHEDULER_CHECK_INTERVAL=30
          DEFAULT_TIMEZONE=Europe/Moscow
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET=${{ secrets.DISCORD_CLIENT_SECRET }}
          DISCORD_REDIRECT_URI=${{ secrets.DISCORD_REDIRECT_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRE_HOURS=24
          ALLOWED_DISCORD_IDS=${{ secrets.ALLOWED_DISCORD_IDS }}
          EOF

      - name: Stop old containers
        run: docker compose down --remove-orphans || true

      - name: Build and deploy
        run: |
          docker compose build bot-api frontend
          docker compose up -d
          sleep 10
          curl -f http://localhost:8181/api/health || exit 1
          curl -f http://localhost:8181/ || exit 1

      - name: Health check — database
        run: docker compose exec -T postgres pg_isready -U ${POSTGRES_USER:-bot}

      - name: Health check — bot-api is running
        run: |
          STATUS=$(docker compose ps bot-api --format json | python3 -c "
          import json,sys
          data=sys.stdin.read().strip()
          try:
            s=json.loads(data)
            if isinstance(s,list): s=s[0]
            print(s.get('State',''))
          except: print('')
          ")
          if echo "$STATUS" | grep -q "running"; then
            echo "Bot API is running"
          else
            echo "Bot API is NOT running"
            exit 1
          fi

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show recent bot-api logs
        if: failure()
        run: docker compose logs bot-api --tail=50
